name: Publish SDK Snapshot

on:
  push:
    branches: [main, develop]

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      
      - name: Set Snapshot Version
        run: |
          # Append -SNAPSHOT to version for dev builds
          sed -i 's/val sdkVersionName = "\(.*\)"/val sdkVersionName = "\1-SNAPSHOT"/' sdk/build.gradle.kts
          echo "Publishing SNAPSHOT version..."
          grep sdkVersionName sdk/build.gradle.kts
      
      - name: Build SDK
        run: ./gradlew :sdk:assembleRelease
      
      - name: Publish to JFrog Snapshots
        env:
          JFROG_USER: ${{ secrets.JFROG_USER }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        run: ./gradlew :sdk:publishReleasePublicationToJFrogSnapshotsRepository
      
      - name: Verify Publication
        env:
          JFROG_USER: ${{ secrets.JFROG_USER }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        run: |
          echo "Snapshot published successfully!"
          echo "Repository: https://wisedrive.jfrog.io/artifactory/wisedrive-sdk-snapshots"
