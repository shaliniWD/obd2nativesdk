name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: wisedrive-obd2-sdk-android
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build SDK library
      run: ./gradlew :sdk:assembleRelease
    
    - name: Build Sample app
      run: ./gradlew :sample:assembleDebug
    
    - name: Run unit tests
      run: ./gradlew :sdk:test
    
    - name: Upload SDK AAR
      uses: actions/upload-artifact@v4
      with:
        name: sdk-release
        path: wisedrive-obd2-sdk-android/sdk/build/outputs/aar/sdk-release.aar
    
    - name: Upload Sample APK
      uses: actions/upload-artifact@v4
      with:
        name: sample-debug-apk
        path: wisedrive-obd2-sdk-android/sample/build/outputs/apk/debug/sample-debug.apk
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: wisedrive-obd2-sdk-android/sdk/build/reports/tests/

  instrumented-tests:
    runs-on: ubuntu-latest
    needs: build
    
    defaults:
      run:
        working-directory: wisedrive-obd2-sdk-android
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
    
    - name: AVD cache
      uses: actions/cache@v4
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-34-x86_64
    
    - name: Create AVD and generate snapshot for caching
      if: steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        working-directory: wisedrive-obd2-sdk-android
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: echo "Generated AVD snapshot for caching"
    
    - name: Run instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        working-directory: wisedrive-obd2-sdk-android
        force-avd-creation: false
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: ./gradlew :sample:connectedDebugAndroidTest
    
    - name: Upload instrumented test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: instrumented-test-results
        path: wisedrive-obd2-sdk-android/sample/build/reports/androidTests/

  lint:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: wisedrive-obd2-sdk-android
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Run lint
      run: ./gradlew lint
    
    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: |
          wisedrive-obd2-sdk-android/sdk/build/reports/lint-results*.html
          wisedrive-obd2-sdk-android/sample/build/reports/lint-results*.html
